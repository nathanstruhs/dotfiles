# Set prefix
unbind C-b
set -g prefix C-a

# Key bindings
# --- Source tmux config
bind-key r source-file ~/dotfiles/tmux/.tmux.conf \; display-message ".tmux.conf reloaded."

# --- Move to pane to match vim motions h,j,k,l
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

# --- Resize pane with shift and arrow keys
bind -n S-Left resize-pane -L 5
bind -n S-Right resize-pane -R 5
bind -n S-Down resize-pane -D 5
bind -n S-Up resize-pane -U 5

# --- Splitting windows
bind-key - split-window -v -c '#{pane_current_path}'
bind-key | split-window -h -c '#{pane_current_path}'

# --- New windows
bind-key c new-window -c '#{pane_current_path}'
set-option -g base-index 1
set-option -g renumber-windows on
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{s/^vector-//:#{b:pane_current_path}}'

# --- Close current window
bind-key q kill-window

# --- Break window
bind-key b break-pane -d

# --- Toggle Claude Code pane (40% height)
bind-key a if-shell "tmux list-panes -F '#{pane_current_command}' | grep -q claude" \
  "run-shell 'tmux kill-pane -t $(tmux list-panes -F \"#{pane_id}:#{pane_current_command}\" | grep claude | head -1 | cut -d: -f1)'" \
  "split-window -v -l 40% -c '#{pane_current_path}' 'caffeinate -i /Users/nathanstruhs/.local/bin/claude --dangerously-skip-permissions'"

# --- Auto-open Claude Code pane in new sessions
set-hook -g session-created "split-window -v -l 40% -c '#{pane_current_path}' 'caffeinate -i /Users/nathanstruhs/.local/bin/claude --dangerously-skip-permissions'"

# --- Use vim keybindings in copy mode
setw -g mode-keys vi

# --- Setup 'v' to begin selection as in Vim
bind-key -Tcopy-mode-vi v send -X begin-selection
bind-key -Tcopy-mode-vi y send -X copy-selection
bind-key -Tcopy-mode-vi Escape send -X cancel
bind-key -Tcopy-mode-vi V send -X rectangle-toggle

# Options
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-ghostty:RGB"
set-option -g status-keys "emacs"
set-option -g history-limit 10000
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
set-option -sg escape-time 10
set-option -g focus-events on
set -g allow-passthrough on

# Vim integrations
# --- Navigate through vim and tmux panes with the same commands
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Design — matched to nvim vscode.nvim theme
setw -g clock-mode-colour '#87865e'
set -g pane-border-style 'fg=#5F5A60 bg=#141414'
set -g pane-active-border-style 'fg=#87865e bg=#141414'
set -g status-position top
set -g status-justify right
set -g status-style 'bg=#141414 fg=#CCCCCC'
set -g status-left '#{S:#{?session_attached,#[fg=#CCCCCC bg=#264F78],#[fg=#5F5A60 bg=#1a1a1a]} #S }'
set -g status-right ''
set-hook -g session-window-changed "if -F '#{@claude_state}' 'run-shell \"/opt/homebrew/bin/tmux set-option -wu @claude_state ; /opt/homebrew/bin/tmux refresh-client -S\"'"
setw -g window-status-current-format '#{?#{==:#{@claude_state},permission}, #[fg=colour196]!#I:#W#[default] ,#{?#{==:#{@claude_state},waiting}, #[fg=colour214]*#I:#W#[default] , #I:#W }}'
setw -g window-status-format '#{?#{==:#{@claude_state},permission}, #[fg=colour196]!#I:#W#[default] ,#{?#{==:#{@claude_state},waiting}, #[fg=colour214]*#I:#W#[default] , #I:#W }}'
setw -g window-status-current-style 'fg=#CCCCCC bg=#264F78'
setw -g window-status-style 'fg=#5F5A60 bg=#1a1a1a'
set -g message-style 'fg=#CCCCCC bg=#1a1a1a'
set -g status-right-length 50
set -g status-left-length 50

