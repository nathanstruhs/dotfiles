# Font
font_family      Fira Code Light
bold_font        Fira Code Medium
italic_font      auto
bold_italic_font auto
font_size        14.0
disable_ligatures never

# Cursor
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor

# Window
window_padding_width 4
# hide_window_decorations titlebar-only
confirm_os_window_close 0
remember_window_size yes

# Scrollback
scrollback_lines 10000

# Bell
enable_audio_bell no

# macOS
macos_option_as_alt yes
macos_quit_when_last_window_closed yes

# Colors — matched from your VS Code Twilight theme
foreground #dfdeae
background #121212

cursor                  #dfdeae
cursor_text_color       #121212

selection_foreground    #121212
selection_background    #dfdeae

# Normal colors
color0  #121212
color1  #af5e5e
color2  #87865e
color3  #af865e
color4  #878687
color5  #ae8687
color6  #87aeae
color7  #dfdeae

# Bright colors
color8  #878687
color9  #af5e5e
color10 #87865e
color11 #af865e
color12 #878687
color13 #ae8687
color14 #87aeae
color15 #ffffff

# Tab bar
tab_bar_style powerline
tab_bar_min_tabs 2
active_tab_foreground   #121212
active_tab_background   #87865e
inactive_tab_foreground #dfdeae
inactive_tab_background #3a3a3a

# Advanced — required for Claude Code notifications through tmux
allow_remote_control yes
